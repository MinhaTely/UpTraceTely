version: "3.8"

services:
  # ======================
  # UPTRACE APM (OpenTelemetry) - Staging (HA)
  # ======================
  uptrace:
    image: ${DOCKERHUB_USERNAME}/uptrace-tely:staging
    ports:
      - target: 443
        published: 14318
        protocol: tcp
        mode: ingress
      - target: 4317
        published: 4317
        protocol: tcp
        mode: ingress
    depends_on:
     - clickhouse
     - uptrace-db
     - uptrace-redis
    environment:
      UPTRACE_SECRET: ${UPTRACE_SECRET}
      UPTRACE_PG_ADDR: ${UPTRACE_PG_ADDR}
      UPTRACE_PG_USER: ${UPTRACE_PG_USER}
      UPTRACE_PG_PASSWORD: ${UPTRACE_PG_PASSWORD}
      UPTRACE_PG_DATABASE: ${UPTRACE_PG_DATABASE}
      UPTRACE_CH_ADDR: ${UPTRACE_CH_ADDR}
      UPTRACE_CH_USER: ${UPTRACE_CH_USER}
      UPTRACE_CH_PASSWORD: ${UPTRACE_CLICKHOUSE_PASSWORD}
      UPTRACE_CH_DATABASE: ${UPTRACE_CH_DATABASE}
      REDIS_ADDR: ${REDIS_ADDR}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      UPTRACE_SITE_URL: ${UPTRACE_SITE_URL}
      UPTRACE_ADMIN_EMAIL: ${UPTRACE_ADMIN_EMAIL}
      UPTRACE_ADMIN_PASSWORD: ${UPTRACE_ADMIN_PASSWORD}
    entrypoint: ["/bin/sh", "/entrypoint-custom.sh"]
    networks:
      - stag_network
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.role == manager
        preferences:
          - spread: node.id
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:443/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ======================
  # CLICKHOUSE (Uptrace Storage) - Staging
  # ======================
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: ${UPTRACE_CH_DATABASE}
      CLICKHOUSE_USER: ${UPTRACE_CH_USER}
      CLICKHOUSE_PASSWORD: ${UPTRACE_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_stag_data:/var/lib/clickhouse
    networks:
      - stag_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
        preferences:
          - spread: node.id
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 180s
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ======================
  # POSTGRESQL (Uptrace Metadata) - Staging
  # ======================
  uptrace-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${UPTRACE_PG_DATABASE}
      POSTGRES_USER: ${UPTRACE_PG_USER}
      POSTGRES_PASSWORD: ${UPTRACE_PG_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - uptrace_pg_stag_data:/var/lib/postgresql/data
    networks:
      - stag_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${UPTRACE_PG_USER} -d ${UPTRACE_PG_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ======================
  # REDIS (Uptrace Cache) - Staging
  # ======================
  uptrace-redis:
    image: redis:7-alpine
    command: >
      sh -c "
      if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes
      else
        redis-server --appendonly yes
      fi
      "
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - uptrace_redis_stag_data:/data
    networks:
      - stag_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: >
        sh -c "
        if [ -n \"$$REDIS_PASSWORD\" ]; then
          redis-cli -a \"$$REDIS_PASSWORD\" ping
        else
          redis-cli ping
        fi
        "
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ======================
  # SWARM UPDATER - Auto-update Uptrace service
  # ======================
  swarm-updater:
    image: docker:25-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
      - /root/.docker
    environment:
      DOCKERHUB_USERNAME: ${DOCKERHUB_USERNAME}
      DOCKERHUB_TOKEN: ${DOCKERHUB_TOKEN}
    command: >
      /bin/sh -c "
      echo \"$$DOCKERHUB_TOKEN\" | docker login -u \"$$DOCKERHUB_USERNAME\" --password-stdin 2>&1 | grep -v 'WARNING' || true &&
      echo '✅ Logado no Docker Hub' &&
      while true; do
        echo '🔄 Atualizando serviços...' &&
        docker service update --with-registry-auth --image $${DOCKERHUB_USERNAME}/uptrace-tely:staging uptrace-tely-stag_uptrace 2>/dev/null || echo 'Erro ao atualizar uptrace' &&
        echo '😴 Aguardando 5 minutos...' &&
        sleep 300
      done
      "
    networks:
      - stag_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

volumes:
  clickhouse_stag_data:
    driver: local
  uptrace_pg_stag_data:
    driver: local
    # For multi-node HA, use shared storage:
    # driver: nfs
    # driver_opts:
    #   share: "172.16.212.26:/data/uptrace-postgres"
    #   o: "addr=172.16.212.26,vers=4"
  uptrace_redis_stag_data:
    driver: local
    # For multi-node HA, use shared storage:
    # driver: nfs
    # driver_opts:
    #   share: "172.16.212.26:/data/uptrace-redis"
    #   o: "addr=172.16.212.26,vers=4"

networks:
  stag_network:
    external: true
    name: tely-vendas-db-stag_stag_network